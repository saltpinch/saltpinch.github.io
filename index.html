<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Звуковое приложение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            max-width: 320px;
        }

        button {
            padding: 24px 20px;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:active {
            transform: scale(0.96);
        }

        .fart-btn {
            background: linear-gradient(145deg, #7b2c2c, #5a1e1e);
            border-bottom: 4px solid #ff8c8c;
        }

        .burp-btn {
            background: linear-gradient(145deg, #2c5e2c, #1e401e);
            border-bottom: 4px solid #a5ffa5;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #0f0f12;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="fart-btn" id="fartButton">💨 ГРОМКИЙ ПУК №1</button>
        <button class="burp-btn" id="burpButton">🤢 ГРОМКИЙ ПУК №2</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ВАЖНО: имена файлов должны точно совпадать с теми, что в репозитории
            // Если файлы называются Fart_1.ogg и Fart_2.ogg - используем эти имена
            const fartSound = new Audio('Fart_1.ogg');
            const burpSound = new Audio('Fart_2.ogg');
            
            // Добавляем обработчик ошибок загрузки
            fartSound.addEventListener('error', (e) => {
                console.error('Ошибка загрузки Fart_1.ogg:', e);
                alert('Не удалось загрузить звук пука. Проверьте, что файл Fart_1.ogg есть в папке.');
            });
            
            burpSound.addEventListener('error', (e) => {
                console.error('Ошибка загрузки Fart_2.ogg:', e);
                alert('Не удалось загрузить звук отрыжки. Проверьте, что файл Fart_2.ogg есть в папке.');
            });

            function playSound(audioElement) {
                // Сбрасываем звук и воспроизводим
                audioElement.pause();
                audioElement.currentTime = 0;
                
                // Пробуем воспроизвести
                const playPromise = audioElement.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.error('Ошибка воспроизведения:', error);
                        alert('Не удалось воспроизвести звук. Нажмите кнопку ещё раз.');
                    });
                }
            }

            const fartBtn = document.getElementById('fartButton');
            const burpBtn = document.getElementById('burpButton');

            fartBtn.addEventListener('click', () => {
                playSound(fartSound);
            });

            burpBtn.addEventListener('click', () => {
                playSound(burpSound);
            });
        });
    </script>
</body>
</html>
